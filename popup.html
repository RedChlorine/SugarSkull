<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SugarSkull Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header>
            <div>💀</div>
            <h1>SugarSkull</h1>
        </header>

        <main>
            <div class="setting-row">
                <div class="setting-info">
                    <span class="setting-title">Enable Theme</span>
                    <span class="setting-description">Apply custom styles to MyModules</span>
                </div>

                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider round"></span>
                </label>
            </div>
        </main>

        <footer>
            <p>MyModules Portal Customiser</p>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>

</html>
